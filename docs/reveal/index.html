<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Baby Reveal!</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #fce4ec, #e3f2fd, #fce4ec);
      font-family: 'Nunito', sans-serif;
      overflow-x: hidden;
    }

    h1 {
      font-size: 2rem;
      color: #555;
      margin-bottom: 0.5rem;
      text-align: center;
    }

    p.hint {
      color: #888;
      margin-bottom: 1.5rem;
      font-size: 1rem;
      text-align: center;
    }

    .cards-wrapper {
      display: flex;
      gap: 2rem;
      flex-wrap: wrap;
      justify-content: center;
      align-items: flex-start;
    }

    .card-column {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .card-label {
      margin-bottom: 0.5rem;
      width: 100px;
      height: 100px;
    }

    .card-label svg {
      width: 100%;
      height: 100%;
    }

    .card-label-text {
      font-size: 1.1rem;
      color: #666;
      margin-bottom: 0.75rem;
      font-weight: bold;
    }

    .card-container {
      position: relative;
      width: 280px;
      height: 280px;
      border-radius: 24px;
      overflow: hidden;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
    }

    #card-girl {
      box-shadow: 0 12px 40px rgba(244, 143, 177, 0.4);
    }

    #card-boy {
      box-shadow: 0 12px 40px rgba(144, 202, 249, 0.4);
    }

    .reveal-content {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #fff;
      text-align: center;
      padding: 1rem;
    }

    .reveal-content.correct {
      background: linear-gradient(135deg, #66bb6a, #2e7d32);
    }

    .reveal-content.wrong {
      background: linear-gradient(135deg, #ef5350, #c62828);
    }

    .reveal-content .result-emoji {
      font-size: 4rem;
      margin-bottom: 0.5rem;
    }

    .reveal-content .result-text {
      font-size: 2rem;
      font-weight: bold;
      text-shadow: 0 2px 8px rgba(0,0,0,0.2);
      letter-spacing: 1px;
    }

    .reveal-content .result-sub {
      font-size: 1.1rem;
      margin-top: 0.5rem;
      opacity: 0.9;
    }

    .scratch-canvas {
      position: absolute;
      inset: 0;
      border-radius: 24px;
      touch-action: none;
    }

    .confetti-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
    }

    #revealMsg {
      margin-top: 1.5rem;
      font-size: 1.3rem;
      font-weight: bold;
      opacity: 0;
      transition: opacity 0.5s;
      text-align: center;
      min-height: 2rem;
    }

    #revealMsg.visible {
      opacity: 1;
    }

    #revealMsg.correct {
      color: #2e7d32;
    }

    #revealMsg.wrong {
      color: #c62828;
    }
  </style>
</head>
<body>
  <h1>&#127880; The baby is ... &#127880;</h1>
  <p class="hint">Pick a card and scratch to find out!</p>

  <div class="cards-wrapper">
    <!-- Girl Card -->
    <div class="card-column">
      <div class="card-label">
        <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
          <!-- Hair -->
          <ellipse cx="60" cy="42" rx="34" ry="36" fill="#5D4037"/>
          <!-- Hair sides (long hair) -->
          <rect x="26" y="42" width="12" height="32" rx="6" fill="#5D4037"/>
          <rect x="82" y="42" width="12" height="32" rx="6" fill="#5D4037"/>
          <!-- Face -->
          <circle cx="60" cy="48" r="28" fill="#FFCC80"/>
          <!-- Eyes -->
          <circle cx="50" cy="46" r="3" fill="#333"/>
          <circle cx="70" cy="46" r="3" fill="#333"/>
          <!-- Smile -->
          <path d="M52 56 Q60 64 68 56" stroke="#333" stroke-width="2" fill="none" stroke-linecap="round"/>
          <!-- Cheeks -->
          <circle cx="42" cy="54" r="4" fill="#F48FB1" opacity="0.5"/>
          <circle cx="78" cy="54" r="4" fill="#F48FB1" opacity="0.5"/>
          <!-- Bow -->
          <path d="M38 24 Q30 18 34 28 Q28 24 38 24Z" fill="#E91E63"/>
          <path d="M38 24 Q46 18 42 28 Q48 24 38 24Z" fill="#E91E63"/>
          <circle cx="38" cy="24" r="2.5" fill="#AD1457"/>
          <!-- Body -->
          <path d="M42 76 Q60 72 78 76 L82 110 Q60 114 38 110Z" fill="#F48FB1"/>
          <!-- Dress collar -->
          <path d="M48 76 Q60 82 72 76" stroke="#E91E63" stroke-width="2" fill="none"/>
        </svg>
      </div>
      <div class="card-label-text">Girl</div>
      <div class="card-container" id="card-girl">
        <div class="reveal-content wrong">
          <div class="result-emoji">&#10060;</div>
          <div class="result-text">Not quite!</div>
          <div class="result-sub">It's a Boy &#128153;</div>
        </div>
        <canvas class="scratch-canvas" data-choice="girl" width="280" height="280"></canvas>
      </div>
    </div>

    <!-- Boy Card -->
    <div class="card-column">
      <div class="card-label">
        <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
          <!-- Full hair back -->
          <ellipse cx="60" cy="38" rx="34" ry="30" fill="#5D4037"/>
          <!-- Hair top volume -->
          <ellipse cx="60" cy="22" rx="28" ry="14" fill="#5D4037"/>
          <!-- Curly tufts -->
          <circle cx="38" cy="22" r="8" fill="#6D4C41"/>
          <circle cx="52" cy="16" r="9" fill="#5D4037"/>
          <circle cx="68" cy="16" r="9" fill="#5D4037"/>
          <circle cx="82" cy="22" r="8" fill="#6D4C41"/>
          <circle cx="45" cy="12" r="6" fill="#6D4C41"/>
          <circle cx="60" cy="10" r="7" fill="#6D4C41"/>
          <circle cx="75" cy="12" r="6" fill="#6D4C41"/>
          <!-- Side hair -->
          <ellipse cx="33" cy="42" rx="7" ry="14" fill="#5D4037"/>
          <ellipse cx="87" cy="42" rx="7" ry="14" fill="#5D4037"/>
          <!-- Face -->
          <circle cx="60" cy="48" r="28" fill="#FFCC80"/>
          <!-- Eyes -->
          <circle cx="50" cy="46" r="3" fill="#333"/>
          <circle cx="70" cy="46" r="3" fill="#333"/>
          <!-- Smile -->
          <path d="M52 56 Q60 64 68 56" stroke="#333" stroke-width="2" fill="none" stroke-linecap="round"/>
          <!-- Cheeks -->
          <circle cx="42" cy="54" r="4" fill="#90CAF9" opacity="0.4"/>
          <circle cx="78" cy="54" r="4" fill="#90CAF9" opacity="0.4"/>
          <!-- Body -->
          <path d="M42 76 Q60 72 78 76 L82 110 Q60 114 38 110Z" fill="#42A5F5"/>
          <!-- Shirt collar -->
          <path d="M52 76 L60 84 L68 76" stroke="#1565C0" stroke-width="2" fill="#1E88E5"/>
          <!-- Buttons -->
          <circle cx="60" cy="92" r="2" fill="#1565C0"/>
          <circle cx="60" cy="100" r="2" fill="#1565C0"/>
        </svg>
      </div>
      <div class="card-label-text">Boy</div>
      <div class="card-container" id="card-boy">
        <div class="reveal-content correct">
          <div class="result-emoji">&#127881;</div>
          <div class="result-text">Correct!</div>
          <div class="result-sub">It's a Boy &#128153;</div>
        </div>
        <canvas class="scratch-canvas" data-choice="boy" width="280" height="280"></canvas>
      </div>
    </div>
  </div>

  <div id="revealMsg"></div>

  <canvas class="confetti-canvas" id="confettiCanvas"></canvas>

  <script>
    (function () {
      const CORRECT = 'boy';
      let gameOver = false;

      document.querySelectorAll('.scratch-canvas').forEach(function (canvas) {
        const ctx = canvas.getContext('2d');
        const width = canvas.width;
        const height = canvas.height;
        const choice = canvas.getAttribute('data-choice');
        let isDrawing = false;
        let revealed = false;

        // Draw scratch-off cover
        function drawCover() {
          ctx.globalCompositeOperation = 'source-over';
          const grad = ctx.createLinearGradient(0, 0, width, height);
          if (choice === 'girl') {
            grad.addColorStop(0, '#F8BBD0');
            grad.addColorStop(0.5, '#FCE4EC');
            grad.addColorStop(1, '#F8BBD0');
          } else {
            grad.addColorStop(0, '#BBDEFB');
            grad.addColorStop(0.5, '#E3F2FD');
            grad.addColorStop(1, '#BBDEFB');
          }
          ctx.fillStyle = grad;

          const r = 24;
          ctx.beginPath();
          ctx.moveTo(r, 0);
          ctx.lineTo(width - r, 0);
          ctx.quadraticCurveTo(width, 0, width, r);
          ctx.lineTo(width, height - r);
          ctx.quadraticCurveTo(width, height, width - r, height);
          ctx.lineTo(r, height);
          ctx.quadraticCurveTo(0, height, 0, height - r);
          ctx.lineTo(0, r);
          ctx.quadraticCurveTo(0, 0, r, 0);
          ctx.closePath();
          ctx.fill();

          ctx.fillStyle = 'rgba(255,255,255,0.25)';
          ctx.font = 'bold 32px Georgia';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          for (let y = 30; y < height; y += 55) {
            for (let x = 30; x < width; x += 55) {
              ctx.fillText('?', x, y);
            }
          }

          ctx.fillStyle = 'rgba(255,255,255,0.7)';
          ctx.font = 'bold 20px Georgia';
          ctx.fillText('Scratch Here!', width / 2, height / 2);
        }

        drawCover();

        ctx.globalCompositeOperation = 'destination-out';
        ctx.lineWidth = 45;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        function getPos(e) {
          const rect = canvas.getBoundingClientRect();
          const scaleX = width / rect.width;
          const scaleY = height / rect.height;
          if (e.touches) {
            return {
              x: (e.touches[0].clientX - rect.left) * scaleX,
              y: (e.touches[0].clientY - rect.top) * scaleY
            };
          }
          return {
            x: (e.clientX - rect.left) * scaleX,
            y: (e.clientY - rect.top) * scaleY
          };
        }

        function startDraw(e) {
          if (gameOver) return;
          e.preventDefault();
          isDrawing = true;
          const pos = getPos(e);
          ctx.beginPath();
          ctx.moveTo(pos.x, pos.y);
        }

        function draw(e) {
          if (!isDrawing || gameOver) return;
          e.preventDefault();
          const pos = getPos(e);
          ctx.lineTo(pos.x, pos.y);
          ctx.stroke();
          checkReveal();
        }

        function stopDraw(e) {
          if (e) e.preventDefault();
          isDrawing = false;
        }

        canvas.addEventListener('mousedown', startDraw);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDraw);
        canvas.addEventListener('mouseleave', stopDraw);
        canvas.addEventListener('touchstart', startDraw, { passive: false });
        canvas.addEventListener('touchmove', draw, { passive: false });
        canvas.addEventListener('touchend', stopDraw, { passive: false });

        function checkReveal() {
          if (revealed || gameOver) return;
          const imageData = ctx.getImageData(0, 0, width, height);
          let transparent = 0;
          const total = imageData.data.length / 4;
          for (let i = 3; i < imageData.data.length; i += 4) {
            if (imageData.data[i] === 0) transparent++;
          }
          if (transparent / total > 0.4) {
            revealed = true;
            gameOver = true;
            ctx.clearRect(0, 0, width, height);

            const isCorrect = choice === CORRECT;
            const msg = document.getElementById('revealMsg');

            // Also reveal the other card
            document.querySelectorAll('.scratch-canvas').forEach(function (c) {
              c.getContext('2d').clearRect(0, 0, c.width, c.height);
            });

            if (isCorrect) {
              msg.innerHTML = '&#127881; Congratulations! You picked right! &#127881;';
              msg.className = 'visible correct';
              launchConfetti();
            } else {
              msg.innerHTML = '&#128546; Wrong pick! It\u2019s a Boy! &#128153;';
              msg.className = 'visible wrong';
            }
          }
        }
      });

      function launchConfetti() {
        const cc = document.getElementById('confettiCanvas');
        cc.width = window.innerWidth;
        cc.height = window.innerHeight;
        const cctx = cc.getContext('2d');
        const pieces = [];
        const colors = ['#42a5f5', '#1e88e5', '#90caf9', '#bbdefb', '#ffffff', '#64b5f6', '#1565c0', '#66bb6a', '#a5d6a7'];

        for (let i = 0; i < 250; i++) {
          pieces.push({
            x: Math.random() * cc.width,
            y: Math.random() * cc.height - cc.height,
            w: Math.random() * 10 + 5,
            h: Math.random() * 6 + 3,
            color: colors[Math.floor(Math.random() * colors.length)],
            vy: Math.random() * 3 + 2,
            vx: (Math.random() - 0.5) * 2,
            rot: Math.random() * Math.PI * 2,
            rv: (Math.random() - 0.5) * 0.1
          });
        }

        let frame = 0;
        function animate() {
          if (frame > 300) { cctx.clearRect(0, 0, cc.width, cc.height); return; }
          frame++;
          cctx.clearRect(0, 0, cc.width, cc.height);
          for (const p of pieces) {
            p.y += p.vy;
            p.x += p.vx;
            p.rot += p.rv;
            cctx.save();
            cctx.translate(p.x, p.y);
            cctx.rotate(p.rot);
            cctx.fillStyle = p.color;
            cctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
            cctx.restore();
          }
          requestAnimationFrame(animate);
        }
        animate();
      }
    })();
  </script>
</body>
</html>
